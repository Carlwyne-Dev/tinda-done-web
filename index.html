    <!-- Primary SEO -->
    <title>TindaDone – Digital POS & Inventory for Sari-Sari Stores</title>
    <meta name="description" content="TindaDone is the ultimate offline-first Point of Sale & inventory tracker designed for Filipino micro-businesses. Start your 7-day free trial today!" />
    <meta name="keywords" content="sari-sari store app, POS Philippines, offline inventory tracker, tindahan app, TindaDone, barcode scanner app" />

    <!-- Open Graph (Facebook, Messenger) -->

    <meta property="og:url" content="https://tindadone.vercel.app/" />
    <meta property="og:title" content="TindaDone – Digital POS for Sari-Sari Stores" />
    <meta property="og:description" content="Throw away the messy notebook. Track sales, inventory, and utang digitally. 7-day free trial, no internet needed." />
    <meta property="og:image" content="https://tindadone.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TindaDone – Digital POS for Sari-Sari Stores" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#050505" />

    <!-- Structured Data (JSON-LD) for SEO Rich Snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://tindadone.vercel.app/#software",
          "name": "TindaDone",
          "operatingSystem": "Android",
          "applicationCategory": "BusinessApplication",
          "downloadUrl": "https://tindadone.vercel.app/tindadone.apk",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "PHP",
            "description": "7-day free trial, lifetime key available via customer support."
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://tindadone.vercel.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Is TindaDone completely offline?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes! TindaDone saves all your inventory and sales data directly on your device. You don't need an internet connection to run your store, making it fast and reliable."
              }
            },
            {
              "@type": "Question",
              "name": "What happens after the 7-day trial?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Once your trial ends, your data is securely locked but never deleted. You just need to purchase a lifetime activation key. Once entered, all your records will instantly unlock and you can continue where you left off."
              }
            },
            {
              "@type": "Question",
              "name": "How do I activate the app?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "After installing, you will see a unique 'Device Code' on your screen. Send this code to our official Facebook page or contact email to purchase your Activation Key."
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
